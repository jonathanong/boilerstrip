name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('package/pnpm-lock.yaml') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        working-directory: package
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build native module
        working-directory: package
        run: pnpm build

      - name: TypeScript type check
        working-directory: package
        run: pnpm exec tsc --noEmit

      - name: Run Node tests
        working-directory: package
        run: pnpm test

      - name: Build and test with internals feature
        run: cargo test -p boilerstrip --features internals

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov -p boilerstrip \
            --fail-under-lines 95 \
            --fail-under-regions 90 \
            --show-missing-lines \
            --lcov \
            --output-path target/llvm-cov/lcov.info

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

  bench:
    name: Bench
    runs-on: ubuntu-latest
    timeout-minutes: 420
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify benchmarks compile
        run: cargo bench --no-run -p boilerstrip
