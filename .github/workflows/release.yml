name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --package boilerstrip

  prepare:
    name: Prepare release
    needs: validate
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT that can push release commits and tags to main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          pnpm --prefix package version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package/package.json').version")"
          node -e "
            const fs = require('node:fs');
            const version = process.argv[1];
            for (const path of ['crate/Cargo.toml', 'package/Cargo.toml']) {
              const cargo = fs.readFileSync(path, 'utf8')
                .replace(/^version = \".*\"$/m, \`version = \"\${version}\"\`);
              fs.writeFileSync(path, cargo);
            }
          " "$version"
          cargo update -w
          git add crate/Cargo.toml package/Cargo.toml Cargo.lock package/package.json
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify versions match
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.bump.outputs.version }}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="boilerstrip") | .version')"
          npm_version="$(node -p "require('./package/package.json').version")"
          test "$tag" = "$cargo_version" || { echo "Cargo version $cargo_version != tag $tag"; exit 1; }
          test "$tag" = "$npm_version" || { echo "npm version $npm_version != tag $tag"; exit 1; }

      - name: Check Cargo package (post-bump)
        run: cargo publish --dry-run --locked -p boilerstrip

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-slim
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            musl: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            musl: true
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: package -> target
          prefix-key: v1-rust-release-${{ matrix.target }}
          cache-bin: "false"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install dependencies
        working-directory: package
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native module
        working-directory: package
        shell: bash
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: package/*.node
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - prepare
      - build
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        working-directory: package
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          path: package
          merge-multiple: true

      - name: Publish Rust crate
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if curl --fail --silent --output /dev/null "https://crates.io/api/v1/crates/boilerstrip/$version"; then
            echo "boilerstrip $version is already on crates.io; skipping"
          else
            cargo publish --locked -p boilerstrip
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.prepare.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Publish npm package
        shell: bash
        working-directory: package
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "boilerstrip@$version" version >/dev/null 2>&1; then
            echo "boilerstrip $version is already on npm; skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
